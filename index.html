<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Terrenos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #007BFF;
            margin-bottom: 20px;
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-top: 10px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="url"], select, textarea {
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 100%;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        button {
            margin-top: 20px;
            padding: 10px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        img {
            display: block;
            width: 150px;
            margin: 0 auto 20px;
        }
        .page {
            display: none;
        }
        .active {
            display: block;
        }
        #mapCentral, #mapTerreno {
            height: 400px;
            width: 100%;
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        #pac-input {
            background-color: #fff;
            font-family: Roboto;
            font-size: 15px;
            font-weight: 300;
            margin-left: 12px;
            padding: 0 11px 0 13px;
            text-overflow: ellipsis;
            width: 300px;
        }
        #pac-input:focus {
            border-color: #4d90fe;
        }

        /* Sincronização de Número */
        .numero-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .numero-row input {
            width: 200px !important;
            flex-shrink: 0;
        }
        .btn-sync {
            margin-top: 0;
            padding: 10px 15px;
            background-color: #28a745;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;
        }
        .btn-sync:hover {
            background-color: #218838;
        }
        .btn-sync:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }

        /* Captura de Imagem */
        .image-capture-section {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #fafafa;
        }
        .capture-methods {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        .capture-methods button {
            margin-top: 0;
            padding: 8px 12px;
            font-size: 13px;
            background-color: #17a2b8;
        }
        .capture-methods button:hover {
            background-color: #138496;
        }
        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 4px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s, background-color 0.3s;
            color: #888;
            font-size: 14px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #007BFF;
            background-color: #e8f0fe;
        }
        .image-preview {
            margin-top: 15px;
            text-align: center;
        }
        .image-preview img {
            display: block;
            max-width: 100%;
            max-height: 300px;
            margin: 0 auto 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
            width: auto;
        }
        .btn-remove {
            background-color: #dc3545;
            margin-top: 0;
            padding: 8px 16px;
            font-size: 14px;
        }
        .btn-remove:hover {
            background-color: #c82333;
        }
        .image-status {
            margin-top: 8px;
            font-size: 13px;
            color: #28a745;
            font-weight: bold;
        }

        /* Editor de Recorte */
        .crop-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .crop-overlay.active {
            display: flex;
        }
        .crop-container {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            max-width: 90vw;
            max-height: 95vh;
            overflow: auto;
            text-align: center;
        }
        .crop-container h3 {
            margin-top: 0;
            color: #333;
        }
        .crop-container p {
            color: #666;
            font-size: 14px;
            margin: 5px 0 10px;
        }
        .crop-canvas-wrapper {
            position: relative;
            margin: 10px auto;
            display: inline-block;
        }
        #cropCanvas {
            display: block;
            cursor: crosshair;
            max-width: 100%;
        }
        .crop-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .crop-buttons button {
            margin-top: 0;
            padding: 10px 20px;
            font-size: 14px;
        }
        .btn-confirm {
            background-color: #28a745;
        }
        .btn-confirm:hover {
            background-color: #218838;
        }
        .btn-full {
            background-color: #6c757d;
        }
        .btn-full:hover {
            background-color: #5a6268;
        }
        .btn-cancel {
            background-color: #dc3545;
        }
        .btn-cancel:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/fabiogrisard/addcasa/refs/heads/main/logoexatanovo.JPG" alt="Logotipo">

        <!-- Página 1 -->
        <div id="page1" class="page active">
            <h1>Formulário de Terrenos</h1>
            <form id="configForm">
                <label for="planilhaNome">Selecione a Planilha:</label>
                <select id="planilhaNome" name="planilhaNome" required>
                    <option value="">Carregando...</option>
                </select>

                <label for="folderId">ID da Pasta no Google Drive:</label>
                <input type="text" id="folderId" name="folderId" required>

                <label for="spreadsheetId">ID da Planilha no Google Sheets:</label>
                <input type="text" id="spreadsheetId" name="spreadsheetId" required>

                <label for="centralLocation">Localização Central da Cidade:</label>
                <input type="text" id="centralLocation" name="centralLocation" required>

                <div id="mapCentral"></div>

                <button type="button" onclick="goToPage2()">Próxima Página</button>
            </form>
        </div>

        <!-- Página 2 -->
        <div id="page2" class="page">
            <h1>Inserção de Dados do Terreno</h1>
            <form id="dataForm">
                <label for="numeroDado">Número do Terreno:</label>
                <div class="numero-row">
                    <input type="text" id="numeroDado" name="numeroDado" required>
                    <button type="button" class="btn-sync" onclick="sincronizarNumero()">Sincronizar</button>
                </div>

                <label for="link">Link do Anúncio:</label>
                <div style="display: flex; align-items: center;">
                    <input type="url" id="link" name="link">
                    <button type="button" onclick="pasteFromClipboard('link')">Colar</button>
                </div>

                <label for="infoImovel">Informações do Imóvel:</label>
                <div style="display: flex; align-items: center;">
                    <textarea id="infoImovel" name="infoImovel"></textarea>
                    <button type="button" onclick="pasteFromClipboard('infoImovel')">Colar</button>
                </div>

                <label for="coordenadas">Coordenadas:</label>
                <input type="text" id="coordenadas" name="coordenadas" required>

                <div id="mapTerreno"></div>
                <button type="button" onclick="getCurrentLocation()">Localizar Minha Posição</button>

                <label for="tipoRua">Tipo de Rua:</label>
                <select id="tipoRua" name="tipoRua" required>
                    <option value="3">Rua de Asfalto</option>
                    <option value="1">Rua de Chão</option>
                    <option value="2">Rua de Calçamento</option>
                </select>

                <label for="esquina">É esquina?</label>
                <select id="esquina" name="esquina" required>
                    <option value="1">Sim</option>
                    <option value="0">Não</option>
                </select>

                <label for="vocacao">Vocação do Terreno:</label>
                <select id="vocacao" name="vocacao" required>
                    <option value="1">Residencial</option>
                    <option value="2">Comercial Pólo Secundário</option>
                    <option value="3">Comercial Pólo Primário</option>
                </select>

                <!-- Captura de Imagem -->
                <div class="image-capture-section">
                    <label>Captura de Imagem do Terreno:</label>
                    <div class="capture-methods">
                        <button type="button" onclick="capturarTela()">A: Print Screen + Recorte (Ctrl+Shift+X)</button>
                        <button type="button" onclick="document.getElementById('fileUpload').click()">B: Upload Direto</button>
                        <button type="button" onclick="alert('Pressione Ctrl+V para colar uma imagem da área de transferência')">C: Colar (Ctrl+V)</button>
                    </div>
                    <input type="file" id="fileUpload" accept="image/*" style="display:none" onchange="handleFileUpload(event)">
                    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileUpload').click()">
                        Arraste uma imagem aqui ou clique para selecionar
                    </div>
                    <div class="image-preview" id="imagePreview" style="display:none;">
                        <img id="previewImg" src="" alt="Preview da Imagem">
                        <button type="button" class="btn-remove" onclick="removerImagem()">Remover Imagem</button>
                    </div>
                    <div class="image-status" id="imageStatus" style="display:none;">
                        ✓ Imagem capturada e pronta para envio
                    </div>
                </div>

                <button type="submit">Enviar Dados</button>
            </form>
        </div>
    </div>

    <!-- Editor de Recorte -->
    <div class="crop-overlay" id="cropOverlay">
        <div class="crop-container">
            <h3>Editor de Recorte</h3>
            <p>Arraste o mouse sobre a imagem para selecionar a área de recorte</p>
            <div class="crop-canvas-wrapper">
                <canvas id="cropCanvas"></canvas>
            </div>
            <div class="crop-buttons">
                <button type="button" class="btn-confirm" onclick="confirmarRecorte()">Confirmar Recorte</button>
                <button type="button" class="btn-full" onclick="usarImagemCompleta()">Usar Imagem Completa</button>
                <button type="button" class="btn-cancel" onclick="cancelarRecorte()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // VARIÁVEIS GLOBAIS
        // ============================================
        let imagemBase64 = null;
        let originalImage = null;
        let cropCanvas = null;
        let cropCtx = null;
        let cropStartX = 0, cropStartY = 0, cropEndX = 0, cropEndY = 0;
        let isCropping = false;
        let cropScale = 1;

        // ============================================
        // INICIALIZAÇÃO
        // ============================================
        window.onload = function() {
            loadPlanilhas();
            initMapCentral();
            initMapTerreno();
            initCropCanvas();
            initDragDrop();
            initKeyboardShortcuts();
            initPasteHandler();

            var ultimoNumero = localStorage.getItem('ultimoNumero');
            if (ultimoNumero) {
                document.getElementById('numeroDado').value = ultimoNumero;
            }
        };

        // ============================================
        // CARREGAR PLANILHAS
        // ============================================
        function loadPlanilhas() {
            var url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRuuja7Tveui7EINl-hHXdHtK9JI8qLnx4bELPAtRQcstNNzN0PMt7_KfsSjuuubl40xLUWaGzyl1AY/pub?gid=0&single=true&output=csv';

            fetch(url)
                .then(function(response) { return response.text(); })
                .then(function(csv) {
                    var linhas = csv.split('\n');
                    var select = document.getElementById('planilhaNome');
                    select.innerHTML = '';

                    linhas.forEach(function(linha) {
                        var colunas = linha.split(',');
                        if (colunas.length === 3) {
                            var nome = colunas[0].trim();
                            var folderId = colunas[1].trim();
                            var spreadsheetId = colunas[2].trim();

                            var option = document.createElement('option');
                            option.value = folderId + ',' + spreadsheetId;
                            option.textContent = nome;
                            select.appendChild(option);
                        }
                    });
                })
                .catch(function(error) {
                    console.error('Erro ao carregar planilhas:', error);
                    var select = document.getElementById('planilhaNome');
                    select.innerHTML = '<option value="">Erro ao carregar</option>';
                });
        }

        document.getElementById('planilhaNome').addEventListener('change', function() {
            var parts = this.value.split(',');
            var folderId = parts[0] || '';
            var spreadsheetId = parts[1] || '';
            document.getElementById('folderId').value = folderId;
            document.getElementById('spreadsheetId').value = spreadsheetId;
        });

        // ============================================
        // NAVEGAÇÃO ENTRE PÁGINAS
        // ============================================
        function goToPage2() {
            var folderId = document.getElementById('folderId').value;
            var spreadsheetId = document.getElementById('spreadsheetId').value;
            var centralLocation = document.getElementById('centralLocation').value;

            if (folderId && spreadsheetId && centralLocation) {
                localStorage.setItem('folderId', folderId);
                localStorage.setItem('spreadsheetId', spreadsheetId);
                localStorage.setItem('centralLocation', centralLocation);

                document.getElementById('page1').classList.remove('active');
                document.getElementById('page2').classList.add('active');
            } else {
                alert('Por favor, preencha todos os campos.');
            }
        }

        // ============================================
        // SINCRONIZAÇÃO DE NÚMERO
        // ============================================
        async function sincronizarNumero() {
            var spreadsheetId = localStorage.getItem('spreadsheetId');
            if (!spreadsheetId) {
                alert('ID da planilha não encontrado. Volte à página 1 e configure.');
                return;
            }

            var btn = document.querySelector('.btn-sync');
            var originalText = btn.textContent;
            btn.textContent = 'Sincronizando...';
            btn.disabled = true;

            try {
                var response = await fetch('https://bleatingfrilledlizard-n8n.cloudfy.live/webhook-test/numerodado', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/'
                    },
                    body: JSON.stringify({ spreadsheetId: spreadsheetId })
                });

                var data = await response.();

                var numero = null;
                if (data.numero !== undefined) {
                    numero = data.numero;
                } else if (data.numeroDado !== undefined) {
                    numero = data.numeroDado;
                } else if (data.number !== undefined) {
                    numero = data.number;
                } else if (typeof data === 'number') {
                    numero = data;
                } else if (Array.isArray(data) && data.length > 0) {
                    numero = data[0].numero || data[0].numeroDado || data[0].number;
                }

                if (numero !== null && numero !== undefined) {
                    document.getElementById('numeroDado').value = numero;
                    localStorage.setItem('ultimoNumero', numero);
                    console.log('Número sincronizado:', numero);
                } else {
                    console.warn('Resposta do webhook:', data);
                    alert('Número não encontrado na resposta do webhook.');
                }
            } catch (error) {
                console.error('Erro ao sincronizar número:', error);
                alert('Erro ao sincronizar número: ' + error.message);
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        // ============================================
        // ENVIO DO FORMULÁRIO
        // ============================================
        document.getElementById('dataForm').addEventListener('submit', function(event) {
            event.preventDefault();
            var numeroDado = document.getElementById('numeroDado').value;
            var link = document.getElementById('link').value;
            var infoImovel = document.getElementById('infoImovel').value;
            var coordenadas = document.getElementById('coordenadas').value;
            var tipoRua = document.getElementById('tipoRua').value;
            var esquina = document.getElementById('esquina').value;
            var vocacao = document.getElementById('vocacao').value;
            var centralLocation = localStorage.getItem('centralLocation');

            if (!link && !infoImovel) {
                alert('Por favor, preencha o Link do Anúncio ou as Informações do Imóvel.');
                return;
            }

            var folderId = localStorage.getItem('folderId');
            var spreadsheetId = localStorage.getItem('spreadsheetId');

            var distancia = calcularDistancia(centralLocation, coordenadas);

            var imagemNome = imagemBase64 ? 'terreno_' + String(numeroDado).padStart(3, '0') + '.png' : '';

            var dadosParaEnviar = {
                folderId: folderId,
                spreadsheetId: spreadsheetId,
                numeroDado: numeroDado,
                link: link,
                infoImovel: infoImovel,
                coordenadas: coordenadas,
                tipoRua: parseInt(tipoRua),
                esquina: parseInt(esquina),
                vocacao: parseInt(vocacao),
                distancia: distancia.toFixed(2),
                imagemBase64: imagemBase64 || '',
                imagemNome: imagemNome
            };

            fetch('https://bleatingfrilledlizard-n8n.cloudfy.live/webhook/addterreno', {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/'
                },
                body: JSON.stringify(dadosParaEnviar)
            })
            .then(function(response) {
                console.log('Resposta recebida');
                alert('Dados enviados com sucesso!');

                var numeroAtual = parseInt(numeroDado);
                if (!isNaN(numeroAtual)) {
                    var proximoNumero = numeroAtual + 1;
                    document.getElementById('numeroDado').value = proximoNumero;
                    localStorage.setItem('ultimoNumero', proximoNumero);
                    console.log('Próximo número:', proximoNumero);
                }
            })
            .catch(function(error) {
                console.error('Erro:', error);
                alert('Erro ao enviar os dados. Por favor, tente novamente.');
            });
        });

        // ============================================
        // CÁLCULO DE DISTÂNCIA
        // ============================================
        function calcularDistancia(centralLocation, coordenadas) {
            var parts1 = centralLocation.split(',').map(Number);
            var parts2 = coordenadas.split(',').map(Number);
            var lat1 = parts1[0];
            var lon1 = parts1[1];
            var lat2 = parts2[0];
            var lon2 = parts2[1];

            var R = 6371;
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon / 2) * Math.sin(dLon / 2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            var distancia = R * c;

            return distancia;
        }

        // ============================================
        // MAPAS
        // ============================================
        function initMapCentral() {
            var mapCentral = new google.maps.Map(document.getElementById("mapCentral"), {
                center: { lat: -25.394552444520578, lng: -51.4582512931166 },
                zoom: 13
            });

            var input = document.createElement("input");
            input.id = "pac-input-central";
            input.className = "controls";
            input.type = "text";
            input.placeholder = "Pesquisar endereço";

            mapCentral.controls[google.maps.ControlPosition.TOP_LEFT].push(input);

            var searchBox = new google.maps.places.SearchBox(input);

            mapCentral.addListener("bounds_changed", function() {
                searchBox.setBounds(mapCentral.getBounds());
            });

            var markers = [];

            searchBox.addListener("places_changed", function() {
                var places = searchBox.getPlaces();
                if (places.length == 0) return;

                markers.forEach(function(marker) { marker.setMap(null); });
                markers = [];

                var bounds = new google.maps.LatLngBounds();
                places.forEach(function(place) {
                    if (!place.geometry || !place.geometry.location) return;

                    var marker = new google.maps.Marker({
                        map: mapCentral,
                        title: place.name,
                        position: place.geometry.location
                    });
                    markers.push(marker);

                    if (place.geometry.viewport) {
                        bounds.union(place.geometry.viewport);
                    } else {
                        bounds.extend(place.geometry.location);
                    }

                    document.getElementById('centralLocation').value = place.geometry.location.lat() + ',' + place.geometry.location.lng();
                });
                mapCentral.fitBounds(bounds);
            });

            mapCentral.addListener("click", function(mapsMouseEvent) {
                var coords = mapsMouseEvent.latLng.lat() + ',' + mapsMouseEvent.latLng.lng();
                document.getElementById('centralLocation').value = coords;
            });
        }

        function initMapTerreno() {
            var mapTerreno = new google.maps.Map(document.getElementById("mapTerreno"), {
                center: { lat: -25.394552444520578, lng: -51.4582512931166 },
                zoom: 13
            });

            var input = document.createElement("input");
            input.id = "pac-input-terreno";
            input.className = "controls";
            input.type = "text";
            input.placeholder = "Pesquisar endereço";

            mapTerreno.controls[google.maps.ControlPosition.TOP_LEFT].push(input);

            var searchBox = new google.maps.places.SearchBox(input);

            mapTerreno.addListener("bounds_changed", function() {
                searchBox.setBounds(mapTerreno.getBounds());
            });

            var markers = [];

            searchBox.addListener("places_changed", function() {
                var places = searchBox.getPlaces();
                if (places.length == 0) return;

                markers.forEach(function(marker) { marker.setMap(null); });
                markers = [];

                var bounds = new google.maps.LatLngBounds();
                places.forEach(function(place) {
                    if (!place.geometry || !place.geometry.location) return;

                    var marker = new google.maps.Marker({
                        map: mapTerreno,
                        title: place.name,
                        position: place.geometry.location
                    });
                    markers.push(marker);

                    if (place.geometry.viewport) {
                        bounds.union(place.geometry.viewport);
                    } else {
                        bounds.extend(place.geometry.location);
                    }

                    document.getElementById('coordenadas').value = place.geometry.location.lat() + ',' + place.geometry.location.lng();
                });
                mapTerreno.fitBounds(bounds);
            });

            mapTerreno.addListener("click", function(mapsMouseEvent) {
                var coords = mapsMouseEvent.latLng.lat() + ',' + mapsMouseEvent.latLng.lng();
                document.getElementById('coordenadas').value = coords;
            });
        }

        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    var lat = position.coords.latitude;
                    var lng = position.coords.longitude;
                    var coords = lat + ',' + lng;

                    var mapTerreno = new google.maps.Map(document.getElementById("mapTerreno"));
                    mapTerreno.setCenter({ lat: lat, lng: lng });

                    new google.maps.Marker({
                        map: mapTerreno,
                        position: { lat: lat, lng: lng }
                    });

                    document.getElementById('coordenadas').value = coords;
                }, function(error) {
                    alert('Erro ao obter a localização: ' + error.message);
                });
            } else {
                alert('Geolocalização não suportada pelo navegador.');
            }
        }

        // ============================================
        // COLAR TEXTO
        // ============================================
        async function pasteFromClipboard(fieldId) {
            try {
                var text = await navigator.clipboard.readText();
                document.getElementById(fieldId).value = text;
            } catch (err) {
                console.error('Falha ao colar texto: ', err);
                alert('Falha ao colar texto. Verifique as permissões do navegador.');
            }
        }

        // ============================================
        // CAPTURA DE IMAGEM - MÉTODO A: PRINT SCREEN (Ctrl+Shift+X)
        // ============================================
        async function capturarTela() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
                alert('Captura de tela não suportada neste navegador. Use Print Screen do teclado e cole com Ctrl+V.');
                return;
            }

            try {
                var stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                var video = document.createElement('video');
                video.srcObject = stream;
                video.play();

                video.onloadedmetadata = function() {
                    var canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    stream.getTracks().forEach(function(track) { track.stop(); });
                    abrirEditorRecorte(canvas.toDataURL('image/png'));
                };
            } catch (err) {
                console.error('Erro ao capturar tela:', err);
                alert('Erro ao capturar tela. Você pode usar Print Screen do teclado e colar com Ctrl+V.');
            }
        }

        // ============================================
        // CAPTURA DE IMAGEM - MÉTODO B: UPLOAD / DRAG & DROP
        // ============================================
        function handleFileUpload(event) {
            var file = event.target.files[0];
            if (file && file.type.startsWith('image/')) {
                processarArquivoImagem(file);
            }
            event.target.value = '';
        }

        function processarArquivoImagem(file) {
            var reader = new FileReader();
            reader.onload = function(event) {
                abrirEditorRecorte(event.target.result);
            };
            reader.readAsDataURL(file);
        }

        function initDragDrop() {
            var dropZone = document.getElementById('dropZone');

            dropZone.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', function(e) {
                this.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
                var files = e.dataTransfer.files;
                if (files.length > 0 && files[0].type.startsWith('image/')) {
                    processarArquivoImagem(files[0]);
                } else {
                    alert('Por favor, solte um arquivo de imagem válido.');
                }
            });
        }

        // ============================================
        // CAPTURA DE IMAGEM - MÉTODO C: COLAR (Ctrl+V)
        // ============================================
        function initPasteHandler() {
            document.addEventListener('paste', function(e) {
                if (!document.getElementById('page2').classList.contains('active')) return;

                var items = e.clipboardData.items;
                for (var i = 0; i < items.length; i++) {
                    if (items[i].type.startsWith('image/')) {
                        e.preventDefault();
                        var blob = items[i].getAsFile();
                        var reader = new FileReader();
                        reader.onload = function(event) {
                            abrirEditorRecorte(event.target.result);
                        };
                        reader.readAsDataURL(blob);
                        return;
                    }
                }
            });
        }

        // ============================================
        // ATALHOS DE TECLADO
        // ============================================
        function initKeyboardShortcuts() {
            document.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.shiftKey && (e.key === 'X' || e.key === 'x')) {
                    e.preventDefault();
                    if (document.getElementById('page2').classList.contains('active')) {
                        capturarTela();
                    }
                }
            });
        }

        // ============================================
        // EDITOR DE RECORTE VISUAL
        // ============================================
        function abrirEditorRecorte(dataUrl) {
            var img = new Image();
            img.onload = function() {
                originalImage = img;
                cropCanvas = document.getElementById('cropCanvas');
                cropCtx = cropCanvas.getContext('2d');

                var maxWidth = 700;
                var maxHeight = 500;
                cropScale = 1;

                if (img.width > maxWidth) cropScale = maxWidth / img.width;
                if (img.height * cropScale > maxHeight) cropScale = maxHeight / img.height;

                cropCanvas.width = img.width * cropScale;
                cropCanvas.height = img.height * cropScale;

                cropCtx.drawImage(img, 0, 0, cropCanvas.width, cropCanvas.height);

                cropStartX = 0;
                cropStartY = 0;
                cropEndX = 0;
                cropEndY = 0;
                isCropping = false;

                document.getElementById('cropOverlay').classList.add('active');
            };
            img.src = dataUrl;
        }

        function initCropCanvas() {
            var canvas = document.getElementById('cropCanvas');

            canvas.addEventListener('mousedown', function(e) {
                var rect = canvas.getBoundingClientRect();
                var scaleX = canvas.width / rect.width;
                var scaleY = canvas.height / rect.height;
                cropStartX = (e.clientX - rect.left) * scaleX;
                cropStartY = (e.clientY - rect.top) * scaleY;
                cropEndX = cropStartX;
                cropEndY = cropStartY;
                isCropping = true;
            });

            canvas.addEventListener('mousemove', function(e) {
                if (!isCropping) return;

                var rect = canvas.getBoundingClientRect();
                var scaleX = canvas.width / rect.width;
                var scaleY = canvas.height / rect.height;
                cropEndX = (e.clientX - rect.left) * scaleX;
                cropEndY = (e.clientY - rect.top) * scaleY;

                cropCtx.drawImage(originalImage, 0, 0, cropCanvas.width, cropCanvas.height);

                var x = Math.min(cropStartX, cropEndX);
                var y = Math.min(cropStartY, cropEndY);
                var w = Math.abs(cropEndX - cropStartX);
                var h = Math.abs(cropEndY - cropStartY);

                cropCtx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                cropCtx.fillRect(0, 0, cropCanvas.width, cropCanvas.height);

                cropCtx.clearRect(x, y, w, h);
                cropCtx.drawImage(originalImage,
                    x / cropScale, y / cropScale, w / cropScale, h / cropScale,
                    x, y, w, h
                );

                cropCtx.strokeStyle = '#007BFF';
                cropCtx.lineWidth = 2;
                cropCtx.strokeRect(x, y, w, h);
            });

            canvas.addEventListener('mouseup', function(e) {
                isCropping = false;
            });

            canvas.addEventListener('mouseleave', function(e) {
                isCropping = false;
            });

            canvas.addEventListener('touchstart', function(e) {
                e.preventDefault();
                var touch = e.touches[0];
                var rect = canvas.getBoundingClientRect();
                var scaleX = canvas.width / rect.width;
                var scaleY = canvas.height / rect.height;
                cropStartX = (touch.clientX - rect.left) * scaleX;
                cropStartY = (touch.clientY - rect.top) * scaleY;
                cropEndX = cropStartX;
                cropEndY = cropStartY;
                isCropping = true;
            });

            canvas.addEventListener('touchmove', function(e) {
                e.preventDefault();
                if (!isCropping) return;

                var touch = e.touches[0];
                var rect = canvas.getBoundingClientRect();
                var scaleX = canvas.width / rect.width;
                var scaleY = canvas.height / rect.height;
                cropEndX = (touch.clientX - rect.left) * scaleX;
                cropEndY = (touch.clientY - rect.top) * scaleY;

                cropCtx.drawImage(originalImage, 0, 0, cropCanvas.width, cropCanvas.height);

                var x = Math.min(cropStartX, cropEndX);
                var y = Math.min(cropStartY, cropEndY);
                var w = Math.abs(cropEndX - cropStartX);
                var h = Math.abs(cropEndY - cropStartY);

                cropCtx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                cropCtx.fillRect(0, 0, cropCanvas.width, cropCanvas.height);

                cropCtx.clearRect(x, y, w, h);
                cropCtx.drawImage(originalImage,
                    x / cropScale, y / cropScale, w / cropScale, h / cropScale,
                    x, y, w, h
                );

                cropCtx.strokeStyle = '#007BFF';
                cropCtx.lineWidth = 2;
                cropCtx.strokeRect(x, y, w, h);
            });

            canvas.addEventListener('touchend', function(e) {
                e.preventDefault();
                isCropping = false;
            });
        }

        function confirmarRecorte() {
            if (cropEndX === cropStartX || cropEndY === cropStartY) {
                alert('Por favor, selecione uma área para recortar arrastando o mouse sobre a imagem.');
                return;
            }

            var x = Math.min(cropStartX, cropEndX) / cropScale;
            var y = Math.min(cropStartY, cropEndY) / cropScale;
            var w = Math.abs(cropEndX - cropStartX) / cropScale;
            var h = Math.abs(cropEndY - cropStartY) / cropScale;

            var outputCanvas = document.createElement('canvas');
            outputCanvas.width = Math.round(w);
            outputCanvas.height = Math.round(h);
            var outputCtx = outputCanvas.getContext('2d');
            outputCtx.drawImage(originalImage, x, y, w, h, 0, 0, w, h);

            imagemBase64 = outputCanvas.toDataURL('image/png');
            mostrarPreview(imagemBase64);

            document.getElementById('cropOverlay').classList.remove('active');
        }

        function usarImagemCompleta() {
            if (!originalImage) return;

            var outputCanvas = document.createElement('canvas');
            outputCanvas.width = originalImage.width;
            outputCanvas.height = originalImage.height;
            var outputCtx = outputCanvas.getContext('2d');
            outputCtx.drawImage(originalImage, 0, 0);

            imagemBase64 = outputCanvas.toDataURL('image/png');
            mostrarPreview(imagemBase64);

            document.getElementById('cropOverlay').classList.remove('active');
        }

        function cancelarRecorte() {
            document.getElementById('cropOverlay').classList.remove('active');
            isCropping = false;
        }

        // ============================================
        // PREVIEW E REMOÇÃO DE IMAGEM
        // ============================================
        function mostrarPreview(base64) {
            document.getElementById('previewImg').src = base64;
            document.getElementById('imagePreview').style.display = 'block';
            document.getElementById('imageStatus').style.display = 'block';
        }

        function removerImagem() {
            imagemBase64 = null;
            document.getElementById('previewImg').src = '';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageStatus').style.display = 'none';
        }
    </script>
