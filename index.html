<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Terrenos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #007BFF;
            margin-bottom: 20px;
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-top: 10px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="url"], select, textarea {
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        button {
            margin-top: 20px;
            padding: 10px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        .logo {
            display: block;
            width: 150px;
            margin: 0 auto 20px;
        }
        .page {
            display: none;
        }
        .active {
            display: block;
        }
        #mapCentral, #mapTerreno {
            height: 400px;
            width: 100%;
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        /* Image Capture Styles */
        .capture-section {
            margin-top: 20px;
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            background: #fafafa;
            position: relative;
        }
        .capture-section.dragover {
            border-color: #007BFF;
            background: #eef6ff;
        }
        .preview-container {
            margin-top: 15px;
            display: none;
            position: relative;
            max-width: 100%;
        }
        .preview-container img {
            max-width: 100%;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .remove-img {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #ff4444;
            color: white;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            line-height: 25px;
            text-align: center;
            cursor: pointer;
            font-weight: bold;
        }

        /* Cropper Modal */
        #cropperModal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #cropperCanvas {
            max-width: 90vw;
            max-height: 80vh;
            cursor: crosshair;
            background: #000;
        }
        .cropper-controls {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .btn-crop { background: #28a745; }
        .btn-full { background: #17a2b8; }
        .btn-cancel { background: #6c757d; }

        .shortcut-hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/fabiogrisard/addcasa/refs/heads/main/logoexatanovo.JPG" alt="Logotipo" class="logo">
        
        <!-- Página 1 -->
        <div id="page1" class="page active">
            <h1>Formulário de Terrenos</h1>
            <form id="configForm">
                <label for="planilhaNome">Selecione a Planilha:</label>
                <select id="planilhaNome" name="planilhaNome" required>
                    <option value="">Carregando...</option>
                </select>

                <label for="folderId">ID da Pasta no Google Drive:</label>
                <input type="text" id="folderId" name="folderId" required>

                <label for="spreadsheetId">ID da Planilha no Google Sheets:</label>
                <input type="text" id="spreadsheetId" name="spreadsheetId" required>

                <label for="centralLocation">Localização Central da Cidade:</label>
                <input type="text" id="centralLocation" name="centralLocation" required>

                <div id="mapCentral"></div>

                <button type="button" onclick="goToPage2()">Próxima Página</button>
            </form>
        </div>

        <!-- Página 2 -->
        <div id="page2" class="page">
            <h1>Inserção de Dados do Terreno</h1>
            <form id="dataForm">
                <label for="numeroDado">Número do Terreno:</label>
                <input type="text" id="numeroDado" name="numeroDado" required placeholder="Ex: 027">

                <label for="link">Link do Anúncio:</label>
                <div style="display: flex; gap: 5px;">
                    <input type="url" id="link" name="link">
                    <button type="button" style="margin-top:5px" onclick="pasteFromClipboard('link')">Colar</button>
                </div>

                <label for="infoImovel">Informações do Imóvel:</label>
                <div style="display: flex; gap: 5px;">
                    <textarea id="infoImovel" name="infoImovel"></textarea>
                    <button type="button" style="margin-top:5px" onclick="pasteFromClipboard('infoImovel')">Colar</button>
                </div>

                <!-- Sistema de Captura de Imagem -->
                <label>Imagem do Terreno:</label>
                <div class="capture-section" id="dropZone">
                    <p>Arraste uma imagem, cole (Ctrl+V) ou clique para selecionar</p>
                    <p class="shortcut-hint">Atalho para Print: Ctrl + Shift + X</p>
                    <input type="file" id="fileInput" accept="image/*" style="display:none">
                    <button type="button" onclick="document.getElementById('fileInput').click()">Selecionar Arquivo</button>
                    
                    <div class="preview-container" id="previewContainer">
                        <div class="remove-img" onclick="removeImage()">×</div>
                        <img id="imagePreview" src="" alt="Preview">
                    </div>
                </div>

                <label for="coordenadas">Coordenadas:</label>
                <input type="text" id="coordenadas" name="coordenadas" required>

                <div id="mapTerreno"></div>
                <button type="button" onclick="getCurrentLocation()">Localizar Minha Posição</button>

                <label for="tipoRua">Tipo de Rua:</label>
                <select id="tipoRua" name="tipoRua" required>
                    <option value="3">Rua de Asfalto</option>
                    <option value="1">Rua de Chão</option>
                    <option value="2">Rua de Calçamento</option>
                </select>

                <label for="esquina">É esquina?</label>
                <select id="esquina" name="esquina" required>
                    <option value="1">Sim</option>
                    <option value="0">Não</option>
                </select>

                <label for="vocacao">Vocação do Terreno:</label>
                <select id="vocacao" name="vocacao" required>
                    <option value="1">Residencial</option>
                    <option value="2">Comercial Pólo Secundário</option>
                    <option value="3">Comercial Pólo Primário</option>
                </select>

                <button type="submit" id="btnSubmit">Enviar Dados</button>
            </form>
        </div>
    </div>

    <!-- Modal do Editor de Recorte -->
    <div id="cropperModal">
        <canvas id="cropperCanvas"></canvas>
        <div class="cropper-controls">
            <button type="button" class="btn-crop" onclick="confirmCrop()">Confirmar Recorte</button>
            <button type="button" class="btn-full" onclick="useFullImage()">Usar Imagem Completa</button>
            <button type="button" class="btn-cancel" onclick="closeCropper()">Cancelar</button>
        </div>
    </div>

    <script>
        let capturedImageBase64 = null;
        let originalImage = new Image();
        let cropperCanvas, ctx;
        let isDrawing = false;
        let startX, startY, currentX, currentY;

        window.onload = function() {
            loadPlanilhas();
            initMapCentral();
            initMapTerreno();
            setupImageCapture();
        };

        // --- MAPAS E NAVEGAÇÃO (MANTIDOS) ---
        function loadPlanilhas() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRuuja7Tveui7EINl-hHXdHtK9JI8qLnx4bELPAtRQcstNNzN0PMt7_KfsSjuuubl40xLUWaGzyl1AY/pub?gid=0&single=true&output=csv';
            fetch(url).then(r => r.text()).then(csv => {
                const linhas = csv.split('\n');
                const select = document.getElementById('planilhaNome');
                select.innerHTML = '';
                linhas.forEach(linha => {
                    const col = linha.split(',');
                    if (col.length >= 3) {
                        const opt = document.createElement('option');
                        opt.value = `${col[1].trim()},${col[2].trim()}`;
                        opt.textContent = col[0].trim();
                        select.appendChild(opt);
                    }
                });
                if(select.options.length > 0) select.dispatchEvent(new Event('change'));
            });
        }

        document.getElementById('planilhaNome').addEventListener('change', function() {
            const [f, s] = this.value.split(',');
            document.getElementById('folderId').value = f || '';
            document.getElementById('spreadsheetId').value = s || '';
        });

        function goToPage2() {
            if (document.getElementById('folderId').value && document.getElementById('centralLocation').value) {
                document.getElementById('page1').classList.remove('active');
                document.getElementById('page2').classList.add('active');
            } else alert('Preencha os campos obrigatórios.');
        }

        // --- SISTEMA DE CAPTURA DE IMAGEM ---
        function setupImageCapture() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            cropperCanvas = document.getElementById('cropperCanvas');
            ctx = cropperCanvas.getContext('2d');

            // Método B: Drag & Drop
            dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
            dropZone.addEventListener('drop', e => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
            });

            // Método B: Clique
            fileInput.addEventListener('change', e => {
                if (e.target.files.length) handleFile(e.target.files[0]);
            });

            // Método C: Colar (Ctrl+V)
            window.addEventListener('paste', e => {
                const items = (e.clipboardData || e.originalEvent.clipboardData).items;
                for (let item of items) {
                    if (item.type.indexOf('image') !== -1) {
                        handleFile(item.getAsFile());
                        break;
                    }
                }
            });

            // Método A: Atalho Ctrl+Shift+X
            window.addEventListener('keydown', e => {
                if (e.ctrlKey && e.shiftKey && e.key.toUpperCase() === 'X') {
                    e.preventDefault();
                    captureScreen();
                }
            });

            // Eventos do Cropper
            cropperCanvas.addEventListener('mousedown', startSelection);
            cropperCanvas.addEventListener('mousemove', drawSelection);
            cropperCanvas.addEventListener('mouseup', endSelection);
            cropperCanvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; startSelection({offsetX: t.clientX - cropperCanvas.getBoundingClientRect().left, offsetY: t.clientY - cropperCanvas.getBoundingClientRect().top}); }, {passive: false});
            cropperCanvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; drawSelection({offsetX: t.clientX - cropperCanvas.getBoundingClientRect().left, offsetY: t.clientY - cropperCanvas.getBoundingClientRect().top}); }, {passive: false});
            cropperCanvas.addEventListener('touchend', endSelection);
        }

        async function captureScreen() {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: "always" }, audio: false });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.play();
                video.onloadedmetadata = () => {
                    setTimeout(() => {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        stream.getTracks().forEach(t => t.stop());
                        openCropper(canvas.toDataURL('image/png'));
                    }, 500);
                };
            } catch (err) { console.error("Erro captura:", err); }
        }

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = e => openCropper(e.target.result);
            reader.readAsDataURL(file);
        }

        function openCropper(dataUrl) {
            originalImage.onload = () => {
                document.getElementById('cropperModal').style.display = 'flex';
                cropperCanvas.width = originalImage.width;
                cropperCanvas.height = originalImage.height;
                resetSelection();
                renderCropper();
            };
            originalImage.src = dataUrl;
        }

        function resetSelection() {
            startX = startY = currentX = currentY = 0;
        }

        function renderCropper() {
            ctx.clearRect(0, 0, cropperCanvas.width, cropperCanvas.height);
            ctx.drawImage(originalImage, 0, 0);
            
            // Overlay escuro
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(0, 0, cropperCanvas.width, cropperCanvas.height);

            if (startX !== currentX || startY !== currentY) {
                const x = Math.min(startX, currentX);
                const y = Math.min(startY, currentY);
                const w = Math.abs(currentX - startX);
                const h = Math.abs(currentY - startY);

                // Limpar área da seleção
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillRect(x, y, w, h);
                ctx.globalCompositeOperation = 'source-over';

                // Borda azul
                ctx.strokeStyle = '#007BFF';
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, w, h);
            }
        }

        function startSelection(e) {
            isDrawing = true;
            startX = e.offsetX;
            startY = e.offsetY;
        }

        function drawSelection(e) {
            if (!isDrawing) return;
            currentX = e.offsetX;
            currentY = e.offsetY;
            renderCropper();
        }

        function endSelection() {
            isDrawing = false;
        }

        function confirmCrop() {
            const x = Math.min(startX, currentX);
            const y = Math.min(startY, currentY);
            const w = Math.abs(currentX - startX);
            const h = Math.abs(currentY - startY);

            if (w < 10 || h < 10) return alert("Selecione uma área válida para recortar.");

            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w;
            tempCanvas.height = h;
            tempCanvas.getContext('2d').drawImage(originalImage, x, y, w, h, 0, 0, w, h);
            setCapturedImage(tempCanvas.toDataURL('image/png'));
            closeCropper();
        }

        function useFullImage() {
            setCapturedImage(originalImage.src);
            closeCropper();
        }

        function setCapturedImage(base64) {
            capturedImageBase64 = base64;
            document.getElementById('imagePreview').src = base64;
            document.getElementById('previewContainer').style.display = 'block';
        }

        function removeImage() {
            capturedImageBase64 = null;
            document.getElementById('previewContainer').style.display = 'none';
            document.getElementById('fileInput').value = '';
        }

        function closeCropper() {
            document.getElementById('cropperModal').style.display = 'none';
        }

        // --- SUBMISSÃO ---
        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const num = document.getElementById('numeroDado').value;
            const folderId = document.getElementById('folderId').value;
            const spreadsheetId = document.getElementById('spreadsheetId').value;
            const coords = document.getElementById('coordenadas').value;
            const central = document.getElementById('centralLocation').value;

            if (!capturedImageBase64) {
                alert("Por favor, capture ou anexe uma imagem do terreno.");
                return;
            }

            const dist = calcularDistancia(central, coords);
            const filename = `terreno_${num.toString().padStart(3, '0')}.png`;

            const payload = {
                folderId,
                spreadsheetId,
                numeroDado: num,
                link: document.getElementById('link').value,
                infoImovel: document.getElementById('infoImovel').value,
                coordenadas: coords,
                tipoRua: parseInt(document.getElementById('tipoRua').value),
                esquina: parseInt(document.getElementById('esquina').value),
                vocacao: parseInt(document.getElementById('vocacao').value),
                distancia: dist.toFixed(2),
                imagemBase64: capturedImageBase64.split(',')[1], // Apenas o dado base64
                imagemNome: filename
            };

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.textContent = "Enviando...";

            fetch('https://bleatingfrilledlizard-n8n.cloudfy.live/webhook/addterreno', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert('Dados enviados com sucesso!');
                location.reload();
            })
            .catch(err => {
                console.error(err);
                alert('Erro ao enviar.');
                btn.disabled = false;
                btn.textContent = "Enviar Dados";
            });
        });

        function calcularDistancia(c1, c2) {
            const [la1, lo1] = c1.split(',').map(Number);
            const [la2, lo2] = c2.split(',').map(Number);
            const R = 6371;
            const dLat = (la2 - la1) * Math.PI / 180;
            const dLon = (lo2 - lo1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // --- GOOGLE MAPS (MANTIDOS) ---
        function initMapCentral() {
            const map = new google.maps.Map(document.getElementById("mapCentral"), { center: { lat: -25.39, lng: -51.45 }, zoom: 13 });
            const input = document.createElement("input");
            input.id = "pac-input-central";
            input.placeholder = "Pesquisar endereço";
            input.style.cssText = "margin-top:10px;padding:10px;width:300px;border:1px solid #ccc";
            map.controls[google.maps.ControlPosition.TOP_LEFT].push(input);
            const sb = new google.maps.places.SearchBox(input);
            sb.addListener("places_changed", () => {
                const p = sb.getPlaces()[0];
                if (p && p.geometry) {
                    document.getElementById('centralLocation').value = p.geometry.location.lat() + ',' + p.geometry.location.lng();
                    map.setCenter(p.geometry.location);
                }
            });
            map.addListener("click", e => document.getElementById('centralLocation').value = e.latLng.lat() + ',' + e.latLng.lng());
        }

        function initMapTerreno() {
            const map = new google.maps.Map(document.getElementById("mapTerreno"), { center: { lat: -25.39, lng: -51.45 }, zoom: 13 });
            const input = document.createElement("input");
            input.id = "pac-input-terreno";
            input.placeholder = "Pesquisar endereço";
            input.style.cssText = "margin-top:10px;padding:10px;width:300px;border:1px solid #ccc";
            map.controls[google.maps.ControlPosition.TOP_LEFT].push(input);
            const sb = new google.maps.places.SearchBox(input);
            sb.addListener("places_changed", () => {
                const p = sb.getPlaces()[0];
                if (p && p.geometry) {
                    document.getElementById('coordenadas').value = p.geometry.location.lat() + ',' + p.geometry.location.lng();
                    map.setCenter(p.geometry.location);
                }
            });
            map.addListener("click", e => document.getElementById('coordenadas').value = e.latLng.lat() + ',' + e.latLng.lng());
        }

        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    const coords = p.coords.latitude + ',' + p.coords.longitude;
                    document.getElementById('coordenadas').value = coords;
                });
            }
        }

        async function pasteFromClipboard(id) {
            try { document.getElementById(id).value = await navigator.clipboard.readText(); } catch(e) {}
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAryf15DN6a0iOH72GMB0IaS3qbL44E8G8&libraries=places" async defer></script>
</body>
</html>
