<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Terrenos</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #007BFF;
            margin-bottom: 20px;
            text-align: center;
        }
        form {
            display: flex;
            flex-direction: column;
        }
        label {
            margin-top: 10px;
            font-weight: bold;
            color: #555;
        }
        input[type="text"], input[type="url"], select, textarea {
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            width: 100%;
        }
        textarea {
            resize: vertical;
            height: 100px;
        }
        button {
            margin-top: 20px;
            padding: 10px;
            background-color: #007BFF;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }
        img {
            display: block;
            width: 150px;
            margin: 0 auto 20px;
        }
        .page {
            display: none;
        }
        .active {
            display: block;
        }
        #mapCentral, #mapTerreno {
            height: 400px;
            width: 100%;
            margin-top: 20px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        #pac-input {
            background-color: #fff;
            font-family: Roboto;
            font-size: 15px;
            font-weight: 300;
            margin-left: 12px;
            padding: 0 11px 0 13px;
            text-overflow: ellipsis;
            width: 300px;
        }
        #pac-input:focus {
            border-color: #4d90fe;
        }
        .field-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }
        .field-row input[type="text"], .field-row input[type="url"] {
            margin-top: 0;
        }
        .btn-small {
            margin-top: 0;
            padding: 10px 15px;
            white-space: nowrap;
            font-size: 14px;
        }
        .feedback {
            margin-top: 5px;
            font-size: 14px;
            min-height: 20px;
            padding: 5px 0;
        }
        .feedback.success { color: #28a745; }
        .feedback.error { color: #dc3545; }
        .feedback.warning { color: #ffc107; }
        .feedback.info { color: #555; }
        #imagemPreview {
            display: none;
            width: 150px;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
        .image-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .image-buttons button {
            margin-top: 0;
            padding: 10px 15px;
            font-size: 14px;
        }
        #btnRemoverImagem {
            background-color: #dc3545;
        }
        #btnRemoverImagem:hover {
            background-color: #c82333;
        }
        #numeroDado {
            width: 200px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://raw.githubusercontent.com/fabiogrisard/addcasa/refs/heads/main/logoexatanovo.JPG" alt="Logotipo">
        
        <!-- Página 1 -->
        <div id="page1" class="page active">
            <h1>Formulário de Terrenos</h1>
            <form id="configForm">
                <label for="planilhaNome">Selecione a Planilha:</label>
                <select id="planilhaNome" name="planilhaNome" required>
                    <option value="">Carregando...</option>
                </select>

                <label for="folderId">ID da Pasta no Google Drive:</label>
                <input type="text" id="folderId" name="folderId" required>

                <label for="spreadsheetId">ID da Planilha no Google Sheets:</label>
                <input type="text" id="spreadsheetId" name="spreadsheetId" required>

                <label for="centralLocation">Localização Central da Cidade:</label>
                <input type="text" id="centralLocation" name="centralLocation" required>

                <div id="mapCentral"></div>

                <button type="button" onclick="goToPage2()">Próxima Página</button>
            </form>
        </div>

        <!-- Página 2 -->
        <div id="page2" class="page">
            <h1>Inserção de Dados do Terreno</h1>
            <form id="dataForm">
                <label for="numeroDado">Número do Terreno:</label>
                <div class="field-row">
                    <input type="text" id="numeroDado" name="numeroDado" required>
                    <button type="button" onclick="sincronizarNumero()" id="btnSincronizar" class="btn-small">Sincronizar</button>
                </div>
                <div id="syncFeedback" class="feedback"></div>

                <label for="link">Link do Anúncio:</label>
                <div class="field-row">
                    <input type="url" id="link" name="link">
                    <button type="button" onclick="pasteFromClipboard('link')" class="btn-small">Colar</button>
                </div>

                <label for="infoImovel">Informações do Imóvel:</label>
                <div class="field-row">
                    <textarea id="infoImovel" name="infoImovel"></textarea>
                    <button type="button" onclick="pasteFromClipboard('infoImovel')" class="btn-small">Colar</button>
                </div>

                <label for="coordenadas">Coordenadas:</label>
                <input type="text" id="coordenadas" name="coordenadas" required>

                <div id="mapTerreno"></div>
                <button type="button" onclick="getCurrentLocation()">Localizar Minha Posição</button>

                <label for="tipoRua">Tipo de Rua:</label>
                <select id="tipoRua" name="tipoRua" required>
                    <option value="3">Rua de Asfalto</option>
                    <option value="1">Rua de Chão</option>
                    <option value="2">Rua de Calçamento</option>
                </select>

                <label for="esquina">É esquina?</label>
                <select id="esquina" name="esquina" required>
                    <option value="1">Sim</option>
                    <option value="0">Não</option>
                </select>

                <label for="vocacao">Vocação do Terreno:</label>
                <select id="vocacao" name="vocacao" required>
                    <option value="1">Residencial</option>
                    <option value="2">Comercial Pólo Secundário</option>
                    <option value="3">Comercial Pólo Primário</option>
                </select>

                <label for="imagemInput">Capturar Imagem do Terreno:</label>
                <div class="image-buttons">
                    <button type="button" onclick="document.getElementById('imagemInput').click()">Capturar Imagem</button>
                    <button type="button" onclick="removerImagem()" id="btnRemoverImagem" style="display: none;">Remover Imagem</button>
                </div>
                <input type="file" id="imagemInput" accept="image/*" capture="environment" style="display: none;" onchange="capturarImagem(event)">
                <img id="imagemPreview" alt="Pré-visualização da imagem">
                <div id="imagemFeedback" class="feedback"></div>

                <button type="submit">Enviar Dados</button>
                <div id="submitFeedback" class="feedback"></div>
            </form>
        </div>
    </div>

    <script>
        // Variáveis globais para imagem
        let imagemBase64 = null;
        let imagemNome = null;

        // No carregamento da página, carregar planilhas existentes e inicializar mapas
        window.onload = function() {
            loadPlanilhas();
            initMapCentral();
            initMapTerreno();
        };

        function loadPlanilhas() {
            const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRuuja7Tveui7EINl-hHXdHtK9JI8qLnx4bELPAtRQcstNNzN0PMt7_KfsSjuuubl40xLUWaGzyl1AY/pub?gid=0&single=true&output=csv';
            
            fetch(url)
                .then(response => response.text())
                .then(csv => {
                    const linhas = csv.split('\n');
                    const select = document.getElementById('planilhaNome');
                    select.innerHTML = ''; // Limpa o "Carregando..."

                    linhas.forEach(linha => {
                        const colunas = linha.split(',');
                        if (colunas.length === 3) {
                            const nome = colunas[0].trim();
                            const folderId = colunas[1].trim();
                            const spreadsheetId = colunas[2].trim();

                            const option = document.createElement('option');
                            option.value = `${folderId},${spreadsheetId}`; // Armazena ambos os IDs
                            option.textContent = nome;
                            select.appendChild(option);
                        }
                    });
                })
                .catch(error => {
                    console.error('Erro ao carregar planilhas:', error);
                    const select = document.getElementById('planilhaNome');
                    select.innerHTML = '<option value="">Erro ao carregar</option>';
                });
        }

        // Ao selecionar uma planilha, preencher IDs
        document.getElementById('planilhaNome').addEventListener('change', function() {
            const [folderId, spreadsheetId] = this.value.split(',');
            document.getElementById('folderId').value = folderId || '';
            document.getElementById('spreadsheetId').value = spreadsheetId || '';
        });

        function goToPage2() {
            const folderId = document.getElementById('folderId').value;
            const spreadsheetId = document.getElementById('spreadsheetId').value;
            const centralLocation = document.getElementById('centralLocation').value;

            if (folderId && spreadsheetId && centralLocation) {
                localStorage.setItem('folderId', folderId);
                localStorage.setItem('spreadsheetId', spreadsheetId);
                localStorage.setItem('centralLocation', centralLocation);

                document.getElementById('page1').classList.remove('active');
                document.getElementById('page2').classList.add('active');
            } else {
                alert('Por favor, preencha todos os campos.');
            }
        }

        // Função para sincronizar o número do terreno via webhook
        function sincronizarNumero() {
            const spreadsheetId = document.getElementById('spreadsheetId').value || localStorage.getItem('spreadsheetId');
            const feedback = document.getElementById('syncFeedback');
            const btn = document.getElementById('btnSincronizar');

            if (!spreadsheetId) {
                feedback.textContent = 'Erro: ID da planilha não encontrado. Volte à página 1 e selecione uma planilha.';
                feedback.className = 'feedback error';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sincronizando...';
            feedback.textContent = 'Sincronizando número com a planilha...';
            feedback.className = 'feedback info';

            fetch('https://bleatingfrilledlizard-n8n.cloudfy.live/webhook-test/numerodado', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ spreadsheetId: spreadsheetId })
            })
            .then(response => {
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('application/json')) {
                    return response.json();
                }
                return response.text().then(text => {
                    try {
                        return JSON.parse(text);
                    } catch (e) {
                        return { numero: text.trim() };
                    }
                });
            })
            .then(data => {
                let numero = null;

                if (typeof data === 'number') {
                    numero = data;
                } else if (typeof data === 'string') {
                    numero = data.trim();
                } else if (Array.isArray(data) && data.length > 0) {
                    const item = data[0];
                    if (typeof item === 'object' && item !== null) {
                        numero = item.numero || item.numeroDado || item.number || item.value || item.numerodado || extractNumberFromObject(item);
                    } else if (typeof item === 'number') {
                        numero = item;
                    }
                } else if (typeof data === 'object' && data !== null) {
                    numero = data.numero || data.numeroDado || data.number || data.value || data.numerodado || extractNumberFromObject(data);
                }

                if (numero !== null && numero !== undefined && numero !== '') {
                    document.getElementById('numeroDado').value = numero;
                    feedback.textContent = '✓ Número sincronizado com sucesso: ' + numero;
                    feedback.className = 'feedback success';
                } else {
                    feedback.textContent = '⚠ Resposta recebida, mas não foi possível extrair o número. Verifique o formato da resposta do webhook.';
                    feedback.className = 'feedback warning';
                    console.log('Resposta do webhook:', data);
                }
            })
            .catch(error => {
                console.error('Erro ao sincronizar:', error);
                feedback.textContent = '✗ Erro ao sincronizar número. Verifique sua conexão e se o webhook está ativo.';
                feedback.className = 'feedback error';
            })
            .finally(() => {
                btn.disabled = false;
                btn.textContent = 'Sincronizar';
            });
        }

        // Função auxiliar para extrair número de um objeto
        function extractNumberFromObject(obj) {
            for (const key in obj) {
                if (typeof obj[key] === 'number') {
                    return obj[key];
                }
                if (typeof obj[key] === 'string' && !isNaN(parseInt(obj[key], 10))) {
                    return obj[key];
                }
            }
            return null;
        }

        // Função para capturar imagem e converter em base64
        function capturarImagem(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                imagemBase64 = e.target.result;
                atualizarNomeImagem();

                const preview = document.getElementById('imagemPreview');
                preview.src = imagemBase64;
                preview.style.display = 'block';

                document.getElementById('btnRemoverImagem').style.display = 'inline-block';

                const feedback = document.getElementById('imagemFeedback');
                feedback.textContent = '✓ Imagem capturada: ' + imagemNome;
                feedback.className = 'feedback success';
            };
            reader.readAsDataURL(file);
        }

        // Função para atualizar o nome da imagem baseado no número do terreno
        function atualizarNomeImagem() {
            const numeroDado = document.getElementById('numeroDado').value;
            const numeroFormatado = String(numeroDado).padStart(3, '0');
            const ext = imagemBase64 ? imagemBase64.match(/data:image\/(\w+);/)[1] : 'png';
            imagemNome = 'terreno_' + numeroFormatado + '.' + ext;
        }

        // Função para remover a imagem capturada
        function removerImagem() {
            imagemBase64 = null;
            imagemNome = null;
            document.getElementById('imagemInput').value = '';
            document.getElementById('imagemPreview').style.display = 'none';
            document.getElementById('btnRemoverImagem').style.display = 'none';
            document.getElementById('imagemFeedback').textContent = '';
            document.getElementById('imagemFeedback').className = 'feedback';
        }

        document.getElementById('dataForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const numeroDado = document.getElementById('numeroDado').value;
            const link = document.getElementById('link').value;
            const infoImovel = document.getElementById('infoImovel').value;
            const coordenadas = document.getElementById('coordenadas').value;
            const tipoRua = document.getElementById('tipoRua').value;
            const esquina = document.getElementById('esquina').value;
            const vocacao = document.getElementById('vocacao').value;
            const centralLocation = localStorage.getItem('centralLocation');

            if (!link && !infoImovel) {
                alert('Por favor, preencha o Link do Anúncio ou as Informações do Imóvel.');
                return;
            }

            const folderId = localStorage.getItem('folderId');
            const spreadsheetId = localStorage.getItem('spreadsheetId');

            // Calcular distância entre localizações
            const distancia = calcularDistancia(centralLocation, coordenadas);

            const dadosParaEnviar = {
                folderId: folderId,
                spreadsheetId: spreadsheetId,
                numeroDado: numeroDado,
                link: link,
                infoImovel: infoImovel,
                coordenadas: coordenadas,
                tipoRua: parseInt(tipoRua),
                esquina: parseInt(esquina),
                vocacao: parseInt(vocacao),
                distancia: distancia.toFixed(2)
            };

            // Adicionar imagem se houver
            if (imagemBase64) {
                atualizarNomeImagem();
                dadosParaEnviar.imagemBase64 = imagemBase64;
                dadosParaEnviar.imagemNome = imagemNome;
            }

            const submitFeedback = document.getElementById('submitFeedback');
            submitFeedback.textContent = 'Enviando dados...';
            submitFeedback.className = 'feedback info';

            fetch('https://bleatingfrilledlizard-n8n.cloudfy.live/webhook/addterreno', {
                method: 'POST',
                mode: 'no-cors',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(dadosParaEnviar)
            })
            .then(response => {
                console.log('Resposta recebida');

                // Construir mensagem de sucesso
                let mensagens = ['✓ Dados enviados com sucesso!'];

                if (imagemBase64) {
                    mensagens.push('✓ Imagem enviada: ' + imagemNome);
                }

                // Incremento automático do número
                const numeroAtual = parseInt(numeroDado, 10);
                if (!isNaN(numeroAtual)) {
                    const proximoNumero = numeroAtual + 1;
                    document.getElementById('numeroDado').value = proximoNumero;
                    mensagens.push('✓ Próximo número preenchido automaticamente: ' + proximoNumero);
                }

                // Limpar imagem após envio
                removerImagem();

                submitFeedback.innerHTML = mensagens.join('<br>');
                submitFeedback.className = 'feedback success';

                alert(mensagens.join('\n'));
            })
            .catch((error) => {
                console.error('Erro:', error);
                submitFeedback.textContent = '✗ Erro ao enviar os dados. Por favor, tente novamente.';
                submitFeedback.className = 'feedback error';
                alert('Erro ao enviar os dados. Por favor, tente novamente.');
            });
        });

        // Calcular distância entre duas coordenadas
        function calcularDistancia(centralLocation, coordenadas) {
            const [lat1, lon1] = centralLocation.split(',').map(Number);
            const [lat2, lon2] = coordenadas.split(',').map(Number);

            const R = 6371; // Raio da Terra em km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distancia = R * c; // Distância em km

            return distancia;
        }

        // Inicializar e configurar o mapa para Localização Central com campo de pesquisa
        function initMapCentral() {
            const mapCentral = new google.maps.Map(document.getElementById("mapCentral"), {
                center: { lat: -25.394552444520578, lng: -51.4582512931166 },
                zoom: 13,
            });

            const input = document.createElement("input");
            input.id = "pac-input-central";
            input.className = "controls";
            input.type = "text";
            input.placeholder = "Pesquisar endereço";

            mapCentral.controls[google.maps.ControlPosition.TOP_LEFT].push(input);

            const searchBox = new google.maps.places.SearchBox(input);

            mapCentral.addListener("bounds_changed", () => {
                searchBox.setBounds(mapCentral.getBounds());
            });

            let markers = [];

            searchBox.addListener("places_changed", () => {
                const places = searchBox.getPlaces();

                if (places.length == 0) {
                    return;
                }

                markers.forEach((marker) => {
                    marker.setMap(null);
                });
                markers = [];

                const bounds = new google.maps.LatLngBounds();
                places.forEach((place) => {
                    if (!place.geometry || !place.geometry.location) {
                        console.log("Returned place contains no geometry");
                        return;
                    }

                    const marker = new google.maps.Marker({
                        map: mapCentral,
                        title: place.name,
                        position: place.geometry.location,
                    });

                    markers.push(marker);

                    if (place.geometry.viewport) {
                        bounds.union(place.geometry.viewport);
                    } else {
                        bounds.extend(place.geometry.location);
                    }

                    document.getElementById('centralLocation').value = place.geometry.location.lat() + ',' + place.geometry.location.lng();
                });
                mapCentral.fitBounds(bounds);
            });

            mapCentral.addListener("click", (mapsMouseEvent) => {
                const coords = mapsMouseEvent.latLng.lat() + ',' + mapsMouseEvent.latLng.lng();
                document.getElementById('centralLocation').value = coords;
            });
        }

        // Inicializar e configurar o mapa para o Terreno
        function initMapTerreno() {
            const mapTerreno = new google.maps.Map(document.getElementById("mapTerreno"), {
                center: { lat: -25.394552444520578, lng: -51.4582512931166 },
                zoom: 13,
            });

            const input = document.createElement("input");
            input.id = "pac-input-terreno";
            input.className = "controls";
            input.type = "text";
            input.placeholder = "Pesquisar endereço";

            mapTerreno.controls[google.maps.ControlPosition.TOP_LEFT].push(input);

            const searchBox = new google.maps.places.SearchBox(input);

            mapTerreno.addListener("bounds_changed", () => {
                searchBox.setBounds(mapTerreno.getBounds());
            });

            let markers = [];

            searchBox.addListener("places_changed", () => {
                const places = searchBox.getPlaces();

                if (places.length == 0) {
                    return;
                }

                markers.forEach((marker) => {
                    marker.setMap(null);
                });
                markers = [];

                const bounds = new google.maps.LatLngBounds();
                places.forEach((place) => {
                    if (!place.geometry || !place.geometry.location) {
                        console.log("Returned place contains no geometry");
                        return;
                    }

                    const marker = new google.maps.Marker({
                        map: mapTerreno,
                        title: place.name,
                        position: place.geometry.location,
                    });

                    markers.push(marker);

                    if (place.geometry.viewport) {
                        bounds.union(place.geometry.viewport);
                    } else {
                        bounds.extend(place.geometry.location);
                    }

                    document.getElementById('coordenadas').value = place.geometry.location.lat() + ',' + place.geometry.location.lng();
                });
                mapTerreno.fitBounds(bounds);
            });

            mapTerreno.addListener("click", (mapsMouseEvent) => {
                const coords = mapsMouseEvent.latLng.lat() + ',' + mapsMouseEvent.latLng.lng();
                document.getElementById('coordenadas').value = coords;
            });
        }

        // Função para obter a localização atual do usuário
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const coords = lat + ',' + lng;

                    const mapTerreno = new google.maps.Map(document.getElementById("mapTerreno"));
                    mapTerreno.setCenter({ lat: lat, lng: lng });

                    new google.maps.Marker({
                        map: mapTerreno,
                        position: { lat: lat, lng: lng }
                    });

                    document.getElementById('coordenadas').value = coords;
                }, function(error) {
                    alert('Erro ao obter a localização: ' + error.message);
                });
            } else {
                alert('Geolocalização não suportada pelo navegador.');
            }
        }

        // Função para colar texto da área de transferência
        async function pasteFromClipboard(fieldId) {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById(fieldId).value = text;
            } catch (err) {
                console.error('Falha ao colar texto: ', err);
                alert('Falha ao colar texto. Verifique as permissões do navegador.');
            }
        }
    </script>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAryf15DN6a0iOH72GMB0IaS3qbL44E8G8&libraries=places&callback=initMapCentral" async defer></script>
</body>
</html>
